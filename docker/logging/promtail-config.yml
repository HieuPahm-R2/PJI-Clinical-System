# =============================================================================
# Promtail - Config
# Thu thập logs từ Docker containers → gửi về Loki
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Thu logs từ tất cả Docker containers
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}

      # Thêm label container name
      - regex:
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/.*'

      # Filter: chỉ giữ logs từ pji-* containers
      - match:
          selector: '{job="docker"}'
          stages:
            - json:
                expressions:
                  stream: stream
                  tag: attrs.tag
            - labels:
                stream: