# =============================================================================
# Prometheus - Config
# Scrape metrics từ OTel Collector và các services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Metrics từ OTel Collector (đã aggregate từ tất cả services)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Spring Boot Actuator metrics
  # host.docker.internal vì backend chạy local, không trong Docker
  - job_name: "pji-backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["pji-backend:8085"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
