# =============================================================================
# Prometheus Alert Rules - PJI Advisor
# =============================================================================

groups:
  - name: pji-advisor-alerts
    rules:
      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"

      # Slow RAG response
      - alert: SlowRAGResponse
        expr: histogram_quantile(0.95, rate(pji_rag_request_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAG response time p95 > 30s"

      # High memory usage
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} using > 1GB memory"

      # RabbitMQ queue backing up
      - alert: RabbitMQQueueBacklog
        expr: pji_rabbitmq_queue_messages > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue backlog > 100 messages"