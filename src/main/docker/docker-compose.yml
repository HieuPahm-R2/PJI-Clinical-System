  minio:
    image: minio/minio:latest
    container_name: pji-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - pji-network

volumes:
  redis_data:
  minio_data:

networks:
  pji-network:
    driver: bridge
