version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: pji-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - pji-network

