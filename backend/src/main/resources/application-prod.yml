springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: never

secure:
  cookie:
    secure: true
    same-site: Lax
  jwt:
    base64-secret: ${JWT_BASE64_SECRET}

integration:
  minio:
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
